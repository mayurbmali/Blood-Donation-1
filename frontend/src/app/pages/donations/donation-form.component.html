<h2 mat-dialog-title>Log Blood Donation</h2>

<form [formGroup]="donationForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content class="form-content flex-col" style="padding-top: 10px;">
    
    <!-- Donor -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Select Donor</mat-label>
      <mat-select formControlName="donorId" required>
        <mat-option *ngFor="let donor of donors" [value]="donor.id">
          {{ donor.user.name }} ({{ donor.bloodGroup.replace('_POS', '+').replace('_NEG', '-') }})
        </mat-option>
      </mat-select>
      <mat-error *ngIf="donationForm.get('donorId')?.hasError('required')">Donor is required</mat-error>
    </mat-form-field>

    <!-- Units Donated -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Units Donated</mat-label>
      <input matInput type="number" formControlName="unitsDonated" min="1" required>
      <mat-error *ngIf="donationForm.get('unitsDonated')?.hasError('required')">Units donated is required</mat-error>
      <mat-error *ngIf="donationForm.get('unitsDonated')?.hasError('min')">Units must be at least 1</mat-error>
    </mat-form-field>

    <!-- Donation Date -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Donation Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="donationDate" required placeholder="Select date">
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-error *ngIf="donationForm.get('donationDate')?.hasError('required')">Donation date is required</mat-error>
    </mat-form-field>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="donationForm.invalid" style="background-color: var(--primary); color: white;">
      Log Donation
    </button>
  </mat-dialog-actions>
</form>
