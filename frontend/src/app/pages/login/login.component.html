<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <h1 class="app-title">BloodBank</h1>
      <p class="app-tagline">Save Lives, Share Life</p>
    </div>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email" placeholder="Enter your email" required autocomplete="email">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email address</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Enter your password" required autocomplete="current-password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Password must be at least 4 characters</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="submit-btn w-full" [disabled]="loginForm.invalid || loading">
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>
    </mat-card-content>
    
    <mat-card-actions class="login-actions">
      <p class="register-link">Don't have an account? <a routerLink="/register">Register Here</a></p>
    </mat-card-actions>
  </mat-card>
</div>
