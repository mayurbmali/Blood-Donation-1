<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-bg__blob auth-bg__blob--1"></div>
    <div class="auth-bg__blob auth-bg__blob--2"></div>
  </div>

  <div class="auth-card ll-anim-enter">
    <div class="auth-card__brand">
      <div class="auth-card__logo">❤</div>
      <span class="auth-card__brand-name">LifeLink</span>
    </div>

    <div class="auth-card__header">
      <h1>Welcome back</h1>
      <p>Sign in to your account to continue</p>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email Address</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput type="email" formControlName="email" required autocomplete="email">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" required autocomplete="current-password">
          <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword" class="toggle-pass">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Minimum 4 characters</mat-error>
        </mat-form-field>

        <button type="submit" class="auth-submit" [disabled]="loginForm.invalid || loading">
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading" class="auth-loading">
            <span class="auth-spinner"></span> Signing in…
          </span>
        </button>
      </form>
    </mat-card-content>

    <div class="auth-card__footer">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
    </div>
  </div>
</div>
