<div class="register-container">
  <mat-card class="register-card">
    <div class="register-header">
      <h1 class="app-title">BloodBank</h1>
      <p class="app-tagline">Create an account to get started</p>
    </div>
    
    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Full Name</mat-label>
          <input matInput type="text" formControlName="name" placeholder="Enter your full name" required>
          <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email" placeholder="Enter your email" required autocomplete="email">
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Please enter a valid email address</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Create a password" required autocomplete="new-password">
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Password must be at least 4 characters</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="submit-btn w-full" [disabled]="registerForm.invalid || loading">
          {{ loading ? 'Creating Account...' : 'Register as Donor' }}
        </button>
      </form>
    </mat-card-content>
    
    <mat-card-actions class="register-actions">
      <p class="login-link">Already have an account? <a routerLink="/login">Sign In Here</a></p>
    </mat-card-actions>
  </mat-card>
</div>
