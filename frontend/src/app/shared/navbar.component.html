<mat-toolbar color="primary" class="navbar-toolbar" *ngIf="isLoggedIn()">
  <span class="logo-text" routerLink="/dashboard">BloodBank</span>
  
  <div class="nav-links">
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
    <a mat-button *ngIf="isAdmin()" routerLink="/donors" routerLinkActive="active-link">Donors</a>
    <a mat-button routerLink="/inventory" routerLinkActive="active-link">Inventory</a>
    <a mat-button routerLink="/requests" routerLinkActive="active-link">Requests</a>
    <a mat-button routerLink="/donations" routerLinkActive="active-link">Donations</a>
  </div>
  
  <span class="spacer"></span>
  
  <div class="user-section">
    <span class="welcome-text">Welcome, {{ getUserName() }}</span>
    <button mat-flat-button color="warn" class="logout-btn" (click)="logout()">Logout</button>
  </div>
</mat-toolbar>
